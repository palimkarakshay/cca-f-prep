<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CCA-F Practice — Diagnostic 01</title>
  <style>
    :root {
      --bg: #0e0f12;
      --panel: #15171c;
      --panel-2: #1b1e25;
      --border: #2a2e38;
      --fg: #e6e8ee;
      --muted: #8a92a3;
      --accent: #d97757;
      --accent-2: #f0a37b;
      --good: #5fb878;
      --bad: #d96565;
      --warn: #d9c265;
      --code: #c5c8d1;
      --radius: 10px;
      --gap: 14px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--fg);
      font: 15px/1.55 ui-sans-serif, -apple-system, "Segoe UI", Inter, Roboto, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    code, kbd, pre, samp { font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; }
    a { color: var(--accent-2); }
    .wrap {
      max-width: 880px;
      margin: 0 auto;
      padding: 28px 20px 80px;
    }
    header.topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .brand {
      display: flex; flex-direction: column; gap: 2px;
    }
    .brand-title {
      font-weight: 600; letter-spacing: .2px; font-size: 16px;
    }
    .brand-sub {
      color: var(--muted); font-size: 12px;
    }
    .meta {
      color: var(--muted); font-size: 12px; text-align: right;
    }
    .progress-shell {
      height: 6px; background: var(--panel-2);
      border-radius: 999px; overflow: hidden;
      margin-bottom: 18px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      width: 0%;
      transition: width .25s ease;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 22px 18px;
    }
    .qhead {
      display: flex; flex-wrap: wrap; gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }
    .badge {
      font-size: 11px;
      letter-spacing: .3px;
      text-transform: uppercase;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 999px;
    }
    .badge.dom { color: var(--accent-2); border-color: rgba(240,163,123,.3); }
    .qno { color: var(--muted); font-size: 12px; }
    h1.qtitle {
      margin: 0 0 6px; font-size: 18px; font-weight: 600;
    }
    .qbody {
      color: var(--fg);
      font-size: 15px;
      margin: 8px 0 18px;
      white-space: pre-wrap;
    }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt {
      display: flex; gap: 12px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--panel-2);
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .05s;
    }
    .opt:hover { border-color: #3b4150; }
    .opt.sel {
      border-color: var(--accent);
      background: #1f1c1a;
    }
    .opt-letter {
      flex: 0 0 26px;
      font-weight: 700;
      color: var(--accent-2);
      font-family: ui-monospace, monospace;
    }
    .opt-text { flex: 1; }
    .reason-wrap {
      margin-top: 18px;
    }
    .reason-label {
      font-size: 12px; color: var(--muted); margin-bottom: 6px;
    }
    textarea.reason {
      width: 100%;
      min-height: 84px;
      resize: vertical;
      background: var(--panel-2);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font: inherit;
      line-height: 1.5;
    }
    textarea.reason:focus {
      outline: none;
      border-color: var(--accent);
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 22px;
    }
    button {
      cursor: pointer;
      font: inherit;
      padding: 10px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--fg);
      transition: border-color .15s, background .15s, opacity .15s;
    }
    button:hover:not(:disabled) { border-color: #3b4150; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button.primary {
      background: var(--accent);
      color: #1a0f0a;
      border-color: var(--accent);
      font-weight: 600;
    }
    button.primary:hover:not(:disabled) {
      background: var(--accent-2);
      border-color: var(--accent-2);
    }
    button.ghost { background: transparent; }
    .nav-spacer { flex: 1; }

    /* Result view */
    .scorecard {
      display: flex;
      align-items: center;
      gap: 22px;
      padding: 22px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, #1c1f26, #15171c);
      border: 1px solid var(--border);
      margin-bottom: 18px;
    }
    .score-num {
      font-size: 44px;
      font-weight: 700;
      letter-spacing: -1px;
      color: var(--accent-2);
      line-height: 1;
    }
    .score-meta { color: var(--muted); font-size: 13px; }
    .score-band {
      margin-left: auto;
      font-size: 12px; color: var(--muted); max-width: 320px;
    }

    .review {
      display: flex; flex-direction: column; gap: 14px;
    }
    .rcard {
      background: var(--panel);
      border: 1px solid var(--border);
      border-left-width: 4px;
      border-radius: var(--radius);
      padding: 18px 18px 16px;
    }
    .rcard.correct { border-left-color: var(--good); }
    .rcard.wrong { border-left-color: var(--bad); }
    .rcard.skipped { border-left-color: var(--warn); }
    .rcard h3 {
      margin: 0 0 6px; font-size: 15px; font-weight: 600;
    }
    .verdict {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .4px;
    }
    .verdict.correct { color: var(--good); }
    .verdict.wrong { color: var(--bad); }
    .verdict.skipped { color: var(--warn); }
    .qtext-mini {
      color: var(--fg); margin: 6px 0 10px; font-size: 14px;
    }
    .answer-row {
      display: flex; flex-wrap: wrap; gap: 16px;
      font-size: 13px;
      margin: 6px 0 10px;
    }
    .answer-row .lbl { color: var(--muted); margin-right: 6px; }
    .answer-row code {
      background: var(--panel-2);
      padding: 1px 6px; border-radius: 4px;
      color: var(--code);
    }
    .explain {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-top: 8px;
    }
    .explain h4 {
      margin: 0 0 8px; font-size: 12px;
      letter-spacing: .3px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .explain ul { margin: 0; padding-left: 18px; }
    .explain li { margin: 3px 0; }
    .explain li.right { color: #c0e0c8; }
    .explain li.right strong { color: var(--good); }
    .principle {
      margin-top: 10px;
      padding: 10px 12px;
      border-left: 2px solid var(--accent);
      background: #1d1a18;
      border-radius: 0 6px 6px 0;
      font-size: 13px;
    }
    .principle .lbl {
      color: var(--accent-2); font-weight: 600; margin-right: 6px;
    }
    .user-notes {
      margin-top: 10px;
      padding: 10px 12px;
      background: #15171c;
      border: 1px dashed var(--border);
      border-radius: 6px;
      font-size: 13px;
      white-space: pre-wrap;
      color: var(--code);
    }
    .user-notes .lbl {
      display: block;
      color: var(--muted);
      font-size: 11px; text-transform: uppercase; letter-spacing: .3px;
      margin-bottom: 4px;
    }

    .start-screen p { color: var(--muted); font-size: 14px; }
    .start-screen ul { color: var(--muted); font-size: 13px; }
    .start-screen .panel { padding: 28px; }
    .start-screen h1 { margin-top: 0; font-size: 22px; }
    .start-screen .start-actions { margin-top: 18px; display: flex; gap: 10px; }

    .footer {
      text-align: center; color: var(--muted);
      font-size: 12px; margin-top: 28px;
    }
    .footer a { color: var(--muted); text-decoration: underline; }

    @media (max-width: 600px) {
      .wrap { padding: 18px 14px 60px; }
      .panel { padding: 18px 16px; }
      .scorecard { flex-wrap: wrap; }
      .score-band { margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <div class="brand-title">CCA-F Practice</div>
        <div class="brand-sub" id="quizSubtitle">Diagnostic 01 — Mixed Domain</div>
      </div>
      <div class="meta" id="metaSlot">10 questions · ~20 min</div>
    </header>

    <div id="root"></div>

    <div class="footer">
      Self-contained practice runner ·
      <a href="https://github.com/palimkarakshay/cca-f-prep" target="_blank" rel="noopener">repo</a>
      · answers and explanations sourced from
      <code>07-mock-exams/solutions/diagnostic-01.md</code>
    </div>
  </div>

  <script>
  /* ------------------------------------------------------------------
     Quiz data — sourced from 07-mock-exams/diagnostic-01.md and its
     solutions file. Keep in sync if the markdown changes.
  ------------------------------------------------------------------ */
  const QUIZ = {
    id: "diagnostic-01",
    title: "Diagnostic 01 — Mixed Domain",
    blurb: "10 scenario-style MCQs across all five exam domains. Mixed difficulty. Aim: ~20 minutes, no notes.",
    questions: [
      {
        n: 1,
        domain: "D1 — Agentic Architecture",
        subarea: "Coordinator-subagent vs. linear loop",
        question: "A team is building a research assistant that must (a) search across 12 internal knowledge bases, (b) cross-check facts across the results, and (c) write a final report. The current implementation runs as a single agentic loop calling tools sequentially. Median latency is 90 seconds and the assistant occasionally drops sources mid-report when the context grows long.\n\nWhat is the strongest reason to refactor to a coordinator-subagent pattern?",
        options: {
          A: "Subagents will reduce per-turn token cost because they run on cheaper models.",
          B: "Independent searches can run in parallel, and each subagent's intermediate context is isolated from the coordinator's.",
          C: "Subagents have access to a longer context window than the coordinator.",
          D: "The coordinator-subagent pattern is required when more than 10 tools are registered."
        },
        correct: "B",
        explanations: {
          A: "Wrong axis. Subagents inherit the parent model unless explicitly configured otherwise; cost is not the canonical justification.",
          B: "The two real wins of coordinator-subagent are parallel execution of independent work and context isolation — the subagent's intermediate scratch never lands in the coordinator's window.",
          C: "False. Subagents don't get a bigger window; they get a fresh one.",
          D: "Fabricated. There is no \"10 tools\" threshold."
        },
        principle: "Reach for coordinator-subagent when (a) work is independently parallelizable or (b) intermediate context would otherwise pollute the parent. Not for cost, not for window size."
      },
      {
        n: 2,
        domain: "D1 — Agentic Architecture",
        subarea: "Hook event placement",
        question: "A developer wants Claude Code to refuse to run any shell command containing rm -rf or --no-verify, regardless of the user's permission mode.\n\nWhich hook event should this rule live in?",
        options: {
          A: "SessionStart — block at session boot before any tool call happens.",
          B: "PreToolUse — inspect and reject the tool call before it executes.",
          C: "PostToolUse — inspect the result and warn if a dangerous command ran.",
          D: "Stop — analyze the full transcript at the end of the session."
        },
        correct: "B",
        explanations: {
          A: "SessionStart runs once at boot with no per-tool-call context. Can't inspect commands.",
          B: "PreToolUse is the only event that fires before a tool call and can return a blocking decision. This is the canonical home for command guardrails.",
          C: "PostToolUse runs after the command. Too late to prevent harm.",
          D: "Stop runs once at session end. Same problem as C, only worse."
        },
        principle: "Pre-execution policy → PreToolUse. The blocking-decision capability is what makes it the right primitive for guardrails."
      },
      {
        n: 3,
        domain: "D1 — Agentic Architecture",
        subarea: "Bounded loops / session budget",
        question: "An agent is implementing a complex feature. It has been going for 47 turns, looping between editing the same file, running tests, and re-editing. The tests still fail.\n\nWhich mitigation is most aligned with agentic-architecture best practices?",
        options: {
          A: "Increase max_tokens so the agent has more room to think.",
          B: "Add a soft watermark at ~80% of max-turns: finish current unit, commit, exit cleanly, resume next run.",
          C: "Switch the agent to a more powerful model mid-run when retries exceed 5.",
          D: "Disable the test-running tool until the agent commits to a written plan."
        },
        correct: "B",
        explanations: {
          A: "Confuses turn budget with token budget. max_tokens controls per-message generation, not loop count.",
          B: "Self-pacing watermarks (~80% commit + exit cleanly, ~95% hard exit) are the canonical defense against runaway loops. Partial progress is preserved; the next run resumes.",
          C: "Escalating model mid-run is not a recognized pattern; adds complexity, doesn't solve loop dynamics.",
          D: "Removes the feedback the agent needs to validate work."
        },
        principle: "Bounded loops with self-pacing watermarks. Exiting at 80% is a success, not a failure — partial work is recoverable."
      },
      {
        n: 4,
        domain: "D2 — Claude Code Config",
        subarea: "CLAUDE.md hygiene",
        question: "A repo's CLAUDE.md has grown to 12,000 tokens over six months. Sessions feel slower to start, and the operator notices Claude sometimes parrots instructions back rather than acting on them.\n\nWhat is the most appropriate action?",
        options: {
          A: "Switch the model to a smaller one to reduce per-token cost.",
          B: "Move historical sections into docs/reference/ and @-include only the parts that are still actively binding.",
          C: "Delete the file and re-derive context from each new session's user prompt.",
          D: "Compress the file with an LLM-based summarizer and overwrite it in place."
        },
        correct: "B",
        explanations: {
          A: "Wrong axis. The bottleneck is context shape, not per-token cost.",
          B: "CLAUDE.md is loaded into context every session — treat it like RAM, not a database. Move historical decisions to disk (reference/, docs/) and @-include or link only what is still binding.",
          C: "Destroys durable behavior anchors that won't be reconstructed from a user prompt.",
          D: "LLM-summarizing loses fidelity, and the file will balloon again."
        },
        principle: "Lean charter, archive history. The same content can serve the agent equally well from reference/ if it's referenced rather than inlined."
      },
      {
        n: 5,
        domain: "D2 — Claude Code Config",
        subarea: "Hooks vs. memory for automation",
        question: "The user says: \"From now on, every time you finish a task, run npm run lint and post the output in the chat.\"\n\nWhich mechanism implements this reliably?",
        options: {
          A: "Add a sentence to CLAUDE.md describing the desired behavior.",
          B: "Save it as a memory / preference for future sessions.",
          C: "Configure a Stop hook in settings.json that runs npm run lint and prints the result.",
          D: "Create a slash command that runs lint, and tell the user to invoke it after each task."
        },
        correct: "C",
        explanations: {
          A: "CLAUDE.md instructions are advisory. The model can interpret, prioritize, or even forget. Not an enforcement mechanism.",
          B: "Same problem as A. Memories/preferences are read by the model, not executed by the harness.",
          C: "Hooks run in the harness layer, deterministically, regardless of what the model decides. \"Every time X\" → Stop hook (or PostToolUse, depending on event).",
          D: "Slash commands require the user to invoke them. \"Every time\" is the user not having to remember."
        },
        principle: "Automated behaviors (\"every time X\", \"from now on when X\") need hooks in settings.json. The harness executes hooks; it does not execute CLAUDE.md or memory. Ask: who runs this — the model, or the harness?"
      },
      {
        n: 6,
        domain: "D3 — Tool Design / MCP",
        subarea: "MCP transport choice",
        question: "A team is building an MCP server that exposes a 50ms-latency internal database. The server will be used by a single developer's Claude Code instance, running on the same machine.\n\nWhich transport should they use?",
        options: {
          A: "HTTP + Server-Sent Events, because it is the future-proof default.",
          B: "stdio, because the server runs on the same machine and its lifecycle is bound to the Claude Code process.",
          C: "WebSockets, for full-duplex streaming.",
          D: "gRPC, for strongly-typed schemas."
        },
        correct: "B",
        explanations: {
          A: "HTTP+SSE is for remote or multi-user MCP servers. Single dev, same machine? Overkill.",
          B: "stdio is the canonical local-machine transport. Claude Code spawns the server as a subprocess; lifecycle is bound to the Claude process; no port management; no auth surface.",
          C: "WebSockets is not a current MCP transport.",
          D: "gRPC is not a current MCP transport."
        },
        principle: "Match transport to deployment shape. Local single-user → stdio. Remote / multi-user → HTTP+SSE."
      },
      {
        n: 7,
        domain: "D3 — Tool Design / MCP",
        subarea: "Tool description quality",
        question: "Two tools are registered: search_documents and find_files. Both currently have one-line descriptions: \"Search the system for documents\" and \"Find files.\" The model keeps picking the wrong one.\n\nWhich fix has the highest leverage?",
        options: {
          A: "Rename the tools to search_documents_v2 and find_files_v2.",
          B: "Rewrite both descriptions to specify what each tool searches (e.g., \"search indexed PDFs by content\" vs. \"list filenames in working directory by glob\"), the input shape, and the kind of question each is right for.",
          C: "Add a system-prompt rule: \"When in doubt, prefer search_documents.\"",
          D: "Merge both tools into one search tool with a mode parameter."
        },
        correct: "B",
        explanations: {
          A: "Renaming is cosmetic. Doesn't tell the model what each tool does.",
          B: "Tool descriptions are the model's selection signal. Specify (1) what it operates on, (2) input shape, (3) ideal-use scenarios, (4) what it does not handle. Differentiation > naming > nudging.",
          C: "System-prompt nudges paper over the design problem and bias the model without informing it.",
          D: "Merging into one tool with a mode param adds API surface complexity to dodge a description-quality issue."
        },
        principle: "When the model picks the wrong tool, the tool's description is the first thing to fix. Renames, system nudges, and tool merges are second-order."
      },
      {
        n: 8,
        domain: "D4 — Prompt Engineering",
        subarea: "Structured output reliability",
        question: "An agent must return a list of {name, email, score} records to be inserted into a database. About 1 in 30 responses has a trailing comma or unescaped quote that breaks JSON.parse.\n\nWhat is the most reliable fix?",
        options: {
          A: "Add \"Return valid JSON, no trailing commas\" to the system prompt.",
          B: "Use the API's structured-output / tool-use mode with a JSON schema for the records.",
          C: "Wrap the response in <json> XML tags and parse the inner content.",
          D: "Increase temperature so the model takes more care."
        },
        correct: "B",
        explanations: {
          A: "Soft constraint in the prompt. The model will still violate it ~3% of the time, exactly the rate the question describes.",
          B: "Structured-output / tool-use mode with a schema uses constrained decoding — the model literally cannot emit tokens that violate the schema for those fields. This is a platform-level guarantee.",
          C: "XML tags don't constrain the JSON inside. The same trailing-comma bug recurs.",
          D: "Higher temperature increases variance, not reliability. (Counter-intuitive at first; the question is testing whether you know that.)"
        },
        principle: "For machine-consumed output, prefer platform-level constraints over prompt-level requests. The model cannot violate a constraint that isn't sampled."
      },
      {
        n: 9,
        domain: "D4 — Prompt Engineering",
        subarea: "Few-shot placement",
        question: "A classification prompt has 5 few-shot examples. The role definition is in the system prompt, the examples sit inline as text inside the user message before the actual input, and the input itself follows. Classification accuracy varies wildly between runs.\n\nWhich restructure is most likely to improve consistency?",
        options: {
          A: "Move all examples into the system prompt as a long bulleted list.",
          B: "Use alternating user / assistant turns for the few-shot examples, then send the actual input as the final user message.",
          C: "Increase temperature to add diversity, then average over multiple runs.",
          D: "Compress the examples with bullet points to fit more into context."
        },
        correct: "B",
        explanations: {
          A: "Works, but inline-text examples in a system prompt match the training distribution less well than conversational turns.",
          B: "Claude is trained on conversation patterns. Putting few-shots as user / assistant alternating turns lets the model pattern-match form and content. Consistency improves because the input→output shape is exemplified, not just described.",
          C: "Temperature averaging is a workaround for poor structure, not a fix.",
          D: "Compressing examples often removes the discriminating signal that makes them few-shots in the first place."
        },
        principle: "Few-shots work best in their natural form — conversation turns, not bulleted text. Match training distribution where possible."
      },
      {
        n: 10,
        domain: "D5 — Context & Reliability",
        subarea: "Prompt caching strategy",
        question: "A team calls Claude with a 30,000-token system prompt (instructions + reference docs) and 200-token user messages. They make ~500 calls per day and want to reduce cost.\n\nWhich strategy delivers the biggest win?",
        options: {
          A: "Truncate the system prompt to 10,000 tokens.",
          B: "Add cache_control to the static reference-docs portion of the system prompt.",
          C: "Switch from Sonnet to Haiku.",
          D: "Batch 10 user messages per call."
        },
        correct: "B",
        explanations: {
          A: "Truncation loses information; you'd ship a worse system prompt to save dollars.",
          B: "Static prefix + 500 calls/day is the exact shape prompt caching is built for. Cache reads are ~10% of the price of cache writes. With a 30k-token reused prefix, this is the largest available lever.",
          C: "Haiku trades quality for cost; doesn't address the underlying inefficiency (sending the same 30k tokens 500 times).",
          D: "Batching helps amortize per-call overhead but doesn't help when the system prompt is the cost driver."
        },
        principle: "When a large stable prefix is reused across calls, prompt caching with cache_control is the highest-leverage cost lever. Place the cache breakpoint at the boundary between stable and dynamic content."
      }
    ]
  };

  const SCORE_BANDS = [
    { min: 9,  text: "Strong baseline. Train the misses' sub-areas only, plus one full mock per week to keep edges sharp." },
    { min: 7,  text: "Solid. Train the misses' domains in full (notes + 5–10 challenges + a per-domain MCQ set), skim the rest." },
    { min: 5,  text: "Sequence training by exam weight: D1 (27%) → D2 (20%) → D4 (20%) → D3 (18%) → D5 (15%). Spend longer on D1." },
    { min: 0,  text: "Slow down. Notes first, then 1 worked example per sub-area before any MCQs." }
  ];

  /* ------------------------------------------------------------------
     State + persistence (per-quiz scoped, attempt-local)
  ------------------------------------------------------------------ */
  const STATE_KEY = "cca-f-prep:" + QUIZ.id + ":attempt";

  const state = loadState() || newState();

  function newState() {
    return {
      view: "start",
      idx: 0,
      answers: QUIZ.questions.map(() => ({ pick: null, notes: "" }))
    };
  }
  function saveState() {
    try { localStorage.setItem(STATE_KEY, JSON.stringify(state)); } catch (e) {}
  }
  function loadState() {
    try {
      const raw = localStorage.getItem(STATE_KEY);
      if (!raw) return null;
      const obj = JSON.parse(raw);
      if (!obj || !Array.isArray(obj.answers) || obj.answers.length !== QUIZ.questions.length) return null;
      return obj;
    } catch (e) { return null; }
  }
  function clearState() {
    try { localStorage.removeItem(STATE_KEY); } catch (e) {}
  }

  /* ------------------------------------------------------------------
     Helpers
  ------------------------------------------------------------------ */
  const root = document.getElementById("root");
  const subtitleEl = document.getElementById("quizSubtitle");
  const metaEl = document.getElementById("metaSlot");
  subtitleEl.textContent = QUIZ.title;

  function el(tag, attrs, ...kids) {
    const e = document.createElement(tag);
    if (attrs) {
      for (const [k, v] of Object.entries(attrs)) {
        if (k === "class") e.className = v;
        else if (k === "html") e.innerHTML = v;
        else if (k.startsWith("on") && typeof v === "function") e.addEventListener(k.slice(2), v);
        else if (v !== false && v != null) e.setAttribute(k, v);
      }
    }
    for (const k of kids.flat()) {
      if (k == null || k === false) continue;
      e.appendChild(typeof k === "string" ? document.createTextNode(k) : k);
    }
    return e;
  }
  function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }

  function setMeta(text) { metaEl.textContent = text; }

  function currentScore() {
    let s = 0;
    QUIZ.questions.forEach((q, i) => {
      if (state.answers[i].pick === q.correct) s++;
    });
    return s;
  }
  function bandFor(score) {
    return SCORE_BANDS.find(b => score >= b.min) || SCORE_BANDS[SCORE_BANDS.length - 1];
  }

  /* ------------------------------------------------------------------
     Views
  ------------------------------------------------------------------ */
  function render() {
    clear(root);
    if (state.view === "start") return renderStart();
    if (state.view === "quiz") return renderQuestion();
    if (state.view === "result") return renderResult();
  }

  function renderStart() {
    setMeta(QUIZ.questions.length + " questions · ~20 min");

    const hasResume = state.answers.some(a => a.pick || a.notes);

    root.appendChild(
      el("div", { class: "panel start-screen" },
        el("h1", null, QUIZ.title),
        el("p", null, QUIZ.blurb),
        el("ul", null,
          el("li", null, "Pick one best answer per question."),
          el("li", null, "Optional reasoning textarea per question — write why you picked what you picked. It shows up next to the explanation in the review."),
          el("li", null, "Your progress is saved to this browser. Refresh-safe."),
          el("li", null, "Score and per-question explanations show at the end.")
        ),
        el("div", { class: "start-actions" },
          el("button", {
            class: "primary",
            onclick: () => {
              if (!hasResume) state.answers = QUIZ.questions.map(() => ({ pick: null, notes: "" }));
              state.view = "quiz";
              saveState();
              render();
            }
          }, hasResume ? "Resume attempt →" : "Start attempt →"),
          hasResume
            ? el("button", { class: "ghost", onclick: () => {
                if (confirm("Reset this attempt and clear all picks/notes?")) {
                  Object.assign(state, newState());
                  state.view = "start";
                  saveState();
                  render();
                }
              } }, "Reset")
            : null
        )
      )
    );
  }

  function renderQuestion() {
    const i = state.idx;
    const total = QUIZ.questions.length;
    const q = QUIZ.questions[i];
    const a = state.answers[i];

    setMeta("Question " + (i + 1) + " of " + total);

    // progress
    const pct = ((i) / total) * 100;
    const progressShell = el("div", { class: "progress-shell" },
      el("div", { class: "progress-fill", style: "width:" + pct + "%" })
    );
    root.appendChild(progressShell);

    // question card
    const optionsWrap = el("div", { class: "options" });
    Object.entries(q.options).forEach(([letter, text]) => {
      const sel = a.pick === letter;
      optionsWrap.appendChild(
        el("div", {
          class: "opt" + (sel ? " sel" : ""),
          role: "button",
          tabindex: "0",
          onclick: () => { a.pick = letter; saveState(); render(); },
          onkeydown: (ev) => {
            if (ev.key === "Enter" || ev.key === " ") {
              ev.preventDefault();
              a.pick = letter; saveState(); render();
            }
          }
        },
          el("div", { class: "opt-letter" }, letter),
          el("div", { class: "opt-text" }, text)
        )
      );
    });

    const reasonTa = el("textarea", {
      class: "reason",
      placeholder: "Optional — write your reasoning. Why this answer? What ruled out the others? Helps make wrong-answer review actionable."
    });
    reasonTa.value = a.notes || "";
    reasonTa.addEventListener("input", (ev) => {
      a.notes = ev.target.value;
      // light debounce: save on blur is enough, but localStorage write is cheap
      saveState();
    });

    const card = el("div", { class: "panel" },
      el("div", { class: "qhead" },
        el("span", { class: "qno" }, "Q" + q.n),
        el("span", { class: "badge dom" }, q.domain),
        el("span", { class: "badge" }, q.subarea)
      ),
      el("h1", { class: "qtitle" }, "Q" + q.n + " — " + q.subarea),
      el("div", { class: "qbody" }, q.question),
      optionsWrap,
      el("div", { class: "reason-wrap" },
        el("div", { class: "reason-label" }, "Your reasoning (optional)"),
        reasonTa
      )
    );
    root.appendChild(card);

    // controls
    const isLast = i === total - 1;
    const allPicked = state.answers.every(x => x.pick);

    const controls = el("div", { class: "controls" },
      el("button", {
        onclick: () => { state.idx = Math.max(0, i - 1); saveState(); render(); },
        disabled: i === 0 ? "disabled" : false
      }, "← Prev"),
      el("div", { class: "nav-spacer" }),
      !isLast
        ? el("button", {
            class: "primary",
            onclick: () => { state.idx = Math.min(total - 1, i + 1); saveState(); render(); }
          }, "Next →")
        : el("button", {
            class: "primary",
            onclick: () => {
              if (!allPicked) {
                const skipped = state.answers.map((x, idx) => x.pick ? null : idx + 1).filter(Boolean);
                if (!confirm("You haven't picked an answer for Q" + skipped.join(", Q") + ". Submit anyway?")) return;
              }
              state.view = "result";
              saveState();
              window.scrollTo({ top: 0 });
              render();
            }
          }, "Submit attempt")
    );
    root.appendChild(controls);
  }

  function renderResult() {
    const total = QUIZ.questions.length;
    const score = currentScore();
    const band = bandFor(score);
    setMeta("Result · " + QUIZ.title);

    // scorecard
    root.appendChild(
      el("div", { class: "scorecard" },
        el("div", null,
          el("div", { class: "score-num" }, score + " / " + total),
          el("div", { class: "score-meta" }, Math.round((score / total) * 100) + "% correct")
        ),
        el("div", { class: "score-band" }, band.text)
      )
    );

    // controls
    root.appendChild(
      el("div", { class: "controls", style: "margin-top:0;margin-bottom:18px;" },
        el("button", {
          onclick: () => { state.view = "quiz"; state.idx = 0; saveState(); window.scrollTo({ top: 0 }); render(); }
        }, "← Back to questions"),
        el("div", { class: "nav-spacer" }),
        el("button", {
          class: "primary",
          onclick: () => {
            if (!confirm("Start a fresh attempt? Picks and notes will be cleared.")) return;
            clearState();
            Object.assign(state, newState());
            state.view = "start";
            saveState();
            window.scrollTo({ top: 0 });
            render();
          }
        }, "Retake")
      )
    );

    // review
    const review = el("div", { class: "review" });
    QUIZ.questions.forEach((q, i) => {
      const a = state.answers[i];
      const picked = a.pick;
      const status = !picked ? "skipped" : (picked === q.correct ? "correct" : "wrong");
      const verdictText = !picked ? "Skipped" : (picked === q.correct ? "Correct" : "Incorrect");

      const expList = el("ul");
      Object.entries(q.options).forEach(([letter, text]) => {
        const isRight = letter === q.correct;
        const why = q.explanations[letter] || "";
        const li = el("li", { class: isRight ? "right" : "" });
        if (isRight) {
          li.appendChild(el("strong", null, letter + " — Correct."));
          li.appendChild(document.createTextNode(" " + why));
        } else {
          li.appendChild(el("strong", null, letter + "."));
          li.appendChild(document.createTextNode(" " + why));
        }
        expList.appendChild(li);
      });

      const card = el("div", { class: "rcard " + status },
        el("div", { class: "qhead" },
          el("span", { class: "qno" }, "Q" + q.n),
          el("span", { class: "badge dom" }, q.domain),
          el("span", { class: "badge" }, q.subarea),
          el("span", { class: "verdict " + status }, verdictText)
        ),
        el("h3", null, "Q" + q.n + " — " + q.subarea),
        el("div", { class: "qtext-mini" }, q.question),
        el("div", { class: "answer-row" },
          el("div", null,
            el("span", { class: "lbl" }, "Your pick:"),
            el("code", null, picked || "—")
          ),
          el("div", null,
            el("span", { class: "lbl" }, "Correct:"),
            el("code", null, q.correct)
          )
        ),
        a.notes && a.notes.trim()
          ? el("div", { class: "user-notes" },
              el("span", { class: "lbl" }, "Your reasoning"),
              a.notes.trim()
            )
          : null,
        el("div", { class: "explain" },
          el("h4", null, "Per-option breakdown"),
          expList
        ),
        el("div", { class: "principle" },
          el("span", { class: "lbl" }, "Principle:"),
          q.principle
        )
      );
      review.appendChild(card);
    });
    root.appendChild(review);

    // bottom retake
    root.appendChild(
      el("div", { class: "controls" },
        el("div", { class: "nav-spacer" }),
        el("button", {
          class: "primary",
          onclick: () => {
            if (!confirm("Start a fresh attempt? Picks and notes will be cleared.")) return;
            clearState();
            Object.assign(state, newState());
            state.view = "start";
            saveState();
            window.scrollTo({ top: 0 });
            render();
          }
        }, "Retake")
      )
    );
  }

  // boot
  render();
  </script>
</body>
</html>
