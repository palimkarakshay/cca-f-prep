name: Deploy docs/ to GitHub Pages

# This is the ONLY Pages deployer for the repo. The auto-generated
# `static.yml` (from GitHub's "Static HTML" Pages template) was removed
# 2026-05-02 because it raced this workflow on the shared `pages`
# concurrency group and uploaded the entire repo (`path: '.'`) on every
# push to main — leaving the site at `/cca-f-prep/` 404 because the repo
# root has no `index.html`. Only `docs/` should ever be uploaded.

on:
  # DISABLED 2026-05-06 — automatic triggers stopped per user request.
  # push:
  #   branches: [main]
  #   paths:
  #     - 'docs/**'
  #     - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Prereq (one-time, in repo): Settings → Pages → Source: GitHub Actions.
      # The default GITHUB_TOKEN has `pages: write` which lets us *deploy* to
      # an already-enabled Pages site, but it cannot *enable* Pages on a repo
      # — that needs an admin-scope token. Earlier attempts used `enablement:
      # true`, which silently relies on admin scope and fails on the default
      # token. Dropped.
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs/ as Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
