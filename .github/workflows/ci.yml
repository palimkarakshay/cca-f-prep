name: CI

# Re-enabled 2026-05-11 as part of the commercialization-readiness
# pass. Fast lane (lint + types + unit) runs on every PR + push to
# main; the slow Playwright lane has moved to ci-e2e.yml on a nightly
# cron to control flake.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  web:
    name: web (lint + types + unit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm test
